        - generic [ref=e110]:
          - paragraph [ref=e111]: "Acreditamos que uma pizza de verdade é feita com paixão. Foi desse sentimento que nasceu a La Sabore Pizzaria. Antes de ser um negócio, ela era um sonho: levar para Miguelópolis uma experiência diferente, com sabores exclusivos, ingredientes de qualidade e um cuidado em cada detalhe que a cidade ainda não conhecia."
          - paragraph [ref=e112]: Desde o primeiro dia, nosso compromisso sempre foi oferecer pizzas de massa fina, preparadas com ingredientes selecionados e um sabor que faz cada momento à mesa ser especial. E, para tornar essa experiência ainda mais completa, nossas bordas recheadas se tornaram um dos grandes diferenciais da La Sabore, conquistando clientes e transformando cada fatia em uma surpresa.
          - paragraph [ref=e113]: Mais do que preparar pizzas, buscamos criar momentos. Queremos que cada pedido reúna famílias, amigos e boas histórias ao redor da mesa.
          - paragraph [ref=e114]: É essa dedicação que nos inspira todos os dias a inovar, manter a qualidade e oferecer uma experiência que vai muito além da pizza.
