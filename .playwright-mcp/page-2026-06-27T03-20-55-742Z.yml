          - paragraph [ref=e113]: Desde o primeiro dia, nosso compromisso sempre foi oferecer pizzas de massa fina, preparadas com ingredientes selecionados e um sabor que faz cada momento à mesa ser especial. E, para tornar essa experiência ainda mais completa, nossas bordas recheadas se tornaram um dos grandes diferenciais da La Sabore, conquistando clientes e transformando cada fatia em uma surpresa.
